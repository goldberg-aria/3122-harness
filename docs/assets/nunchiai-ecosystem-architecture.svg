<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Nunchi AI memory ecosystem architecture</title>
<desc>Layered architecture showing harness clients at top, AMCP protocol in the middle as a bridge, memory backends below, and Synapsis Engine as the shared foundation.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .arr { stroke: #888; stroke-width: 1.5; }

  /* Light mode defaults */
  .tier-label { fill: #888780; }

  .client-box rect { fill: #E1F5EE; stroke: #0F6E56; }
  .client-box .th { fill: #085041; }
  .client-box .ts { fill: #0F6E56; }

  .protocol-box rect { fill: #EEEDFE; stroke: #534AB7; }
  .protocol-box .th { fill: #3C3489; }
  .protocol-box .ts { fill: #534AB7; }

  .backend-box rect { fill: #E6F1FB; stroke: #185FA5; }
  .backend-box .th { fill: #0C447C; }
  .backend-box .ts { fill: #185FA5; }

  .engine-box rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .engine-box .th { fill: #444441; }
  .engine-box .ts { fill: #5F5E5A; }

  .future-box rect { fill: none; stroke: #888780; }
  .future-box .ts { fill: #888780; }

  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    .tier-label { fill: #888780; }
    .arr { stroke: #888780; }

    .client-box rect { fill: #085041; stroke: #5DCAA5; }
    .client-box .th { fill: #9FE1CB; }
    .client-box .ts { fill: #5DCAA5; }

    .protocol-box rect { fill: #3C3489; stroke: #AFA9EC; }
    .protocol-box .th { fill: #CECBF6; }
    .protocol-box .ts { fill: #AFA9EC; }

    .backend-box rect { fill: #0C447C; stroke: #85B7EB; }
    .backend-box .th { fill: #B5D4F4; }
    .backend-box .ts { fill: #85B7EB; }

    .engine-box rect { fill: #444441; stroke: #B4B2A9; }
    .engine-box .th { fill: #D3D1C7; }
    .engine-box .ts { fill: #B4B2A9; }

    .future-box rect { stroke: #5F5E5A; }
    .future-box .ts { fill: #5F5E5A; }
  }
</style>

<!-- Tier labels -->
<text class="ts tier-label" x="40" y="72">Clients</text>
<text class="ts tier-label" x="40" y="192">Protocol</text>
<text class="ts tier-label" x="40" y="312">Backends</text>
<text class="ts tier-label" x="40" y="430">Engine</text>

<!-- Harness: 3122 -->
<g class="client-box">
  <rect x="120" y="46" width="200" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="220" y="66" text-anchor="middle" dominant-baseline="central">3122-harness</text>
  <text class="ts" x="220" y="84" text-anchor="middle" dominant-baseline="central">Reference client</text>
</g>

<!-- Other harnesses (future) -->
<g class="future-box">
  <rect x="380" y="46" width="200" height="52" rx="8" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.6"/>
  <text class="ts" x="480" y="72" text-anchor="middle" dominant-baseline="central" opacity="0.6">Any AMCP-compatible harness</text>
</g>

<!-- Arrows: harnesses → AMCP -->
<line x1="220" y1="98" x2="220" y2="164" class="arr" marker-end="url(#arrow)"/>
<line x1="480" y1="98" x2="480" y2="164" class="arr" marker-end="url(#arrow)" opacity="0.35" stroke-dasharray="4 3"/>

<!-- AMCP protocol -->
<g class="protocol-box">
  <rect x="120" y="164" width="460" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="350" y="184" text-anchor="middle" dominant-baseline="central">AMCP standard</text>
  <text class="ts" x="350" y="202" text-anchor="middle" dominant-baseline="central">Vendor-neutral memory contract</text>
</g>

<!-- Arrows: AMCP → backends -->
<line x1="200" y1="216" x2="200" y2="282" class="arr" marker-end="url(#arrow)"/>
<line x1="350" y1="216" x2="350" y2="282" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="216" x2="500" y2="282" class="arr" marker-end="url(#arrow)"/>

<!-- Backend: Nexus -->
<g class="backend-box">
  <rect x="120" y="282" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="304" text-anchor="middle" dominant-baseline="central">Nexus</text>
  <text class="ts" x="200" y="322" text-anchor="middle" dominant-baseline="central">Agents / developers</text>
</g>

<!-- Backend: Norfolk -->
<g class="backend-box">
  <rect x="300" y="282" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="380" y="304" text-anchor="middle" dominant-baseline="central">Norfolk</text>
  <text class="ts" x="380" y="322" text-anchor="middle" dominant-baseline="central">Personal memory</text>
</g>

<!-- Backend: MaaS -->
<g class="backend-box">
  <rect x="480" y="282" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="304" text-anchor="middle" dominant-baseline="central">MaaS</text>
  <text class="ts" x="560" y="322" text-anchor="middle" dominant-baseline="central">Enterprise infra</text>
</g>

<!-- Arrows: backends → Synapsis -->
<line x1="200" y1="338" x2="200" y2="404" class="arr" marker-end="url(#arrow)"/>
<line x1="380" y1="338" x2="380" y2="404" class="arr" marker-end="url(#arrow)"/>
<line x1="560" y1="338" x2="560" y2="404" class="arr" marker-end="url(#arrow)"/>

<!-- Synapsis Engine -->
<g class="engine-box">
  <rect x="120" y="404" width="520" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="380" y="424" text-anchor="middle" dominant-baseline="central">Synapsis engine</text>
  <text class="ts" x="380" y="442" text-anchor="middle" dominant-baseline="central">Shared atomization pipeline</text>
</g>

</svg>
